<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>CEL Voice Assistant - Sankalp Helpline</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: radial-gradient(circle at 30% 0%, #182234 0%, #0b0e14 55%);
    color: #e8eaed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px;
    min-height: 100vh;
    margin: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .brand-badge {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #6d28d9, #2563eb);
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.2px;
  }
  h1 .sub-brand {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #8b93a1;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  p.sub {
    color: #8b93a1;
    margin-top: 4px;
    margin-bottom: 34px;
    text-align: center;
    font-size: 13.5px;
    max-width: 360px;
    line-height: 1.5;
  }
  .card {
    background: linear-gradient(180deg, #171b26 0%, #12151f 100%);
    border: 1px solid #262b3a;
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #a7adba;
    margin-bottom: 7px;
    margin-top: 4px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 11px 13px;
    border-radius: 9px;
    border: 1px solid #2c3242;
    background: #0d0f16;
    color: #e8eaed;
    font-size: 14px;
  }
  input:focus { outline: none; border-color: #6d28d9; }
  button {
    margin-top: 22px;
    width: 100%;
    padding: 14px;
    border-radius: 11px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, #6d28d9, #2563eb);
    color: white;
    letter-spacing: 0.2px;
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin-top: 18px;
    font-size: 13px;
    text-align: center;
    color: #8b93a1;
    min-height: 18px;
  }
  .status.live { color: #34d399; font-weight: 500; }
  .status.error { color: #f87171; }
  #chat {
    margin-top: 20px;
    background: #0d0f16;
    border-radius: 10px;
    padding: 16px;
    max-height: 400px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }
  .msg-user { color: #60a5fa; margin-bottom: 10px; }
  .msg-agent { color: #34d399; margin-bottom: 14px; white-space: pre-wrap; }
  .msg-label { font-size: 11px; color: #5b6270; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .inputRow { display: flex; justify-content: center; margin-top: 22px; }
  .footer-note {
    margin-top: 22px;
    font-size: 11.5px;
    color: #4b5160;
    text-align: center;
    max-width: 380px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-badge">🎙️</div>
  <h1>CEL Voice Assistant
    <span class="sub-brand">Sankalp Helpline</span>
  </h1>
</div>
<p class="sub">Maternal &amp; neonatal care navigation — voice agent ko yahan test karein</p>

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <label style="margin:0;">Agent</label>
    <span id="editAgentLink" onclick="toggleAgentEdit()" style="font-size:11px; color:#8b5cf6; cursor:pointer; text-decoration:underline; text-transform:none; letter-spacing:0;">Edit</span>
  </div>
  <div id="agentFixed" style="padding:11px 13px; border-radius:9px; background:#0d0f16; border:1px solid #2c3242; font-size:13.5px; color:#c7cbd4; font-family:monospace;">agent_mO73jSPaXLco2JuS</div>
  <input type="text" id="agentId" value="agent_mO73jSPaXLco2JuS" style="display:none; margin-top:0;">

  <button id="connectBtn" onclick="connect()">Connect (Voice)</button>

  <div id="status" class="status">Connect dabayein aur baat shuru karein</div>
  <div id="chat"></div>

  <div class="inputRow" id="inputRow" style="display:none;">
    <button id="micBtn" onclick="toggleMic()" style="background:#16a34a; margin-top:0;">🎙️ Mic On</button>
  </div>
</div>
<p class="footer-note">Community Empowerment Lab · Sankalp Programme<br>Internal testing tool — kripya is link ko public share na karein</p>

<script>
let ws = null;
let audioContext = null;
let mediaStream = null;
let processor = null;
let nextPlayTime = 0;
let micActive = false;

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');
  chat.style.display = 'block';
  const div = document.createElement('div');
  div.className = role === 'user' ? 'msg-user' : 'msg-agent';
  div.innerHTML = `<span class="msg-label">${role === 'user' ? 'Aap' : 'अग्रिमा'}</span>${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

let currentAgentDiv = null;

function toggleAgentEdit() {
  const fixed = document.getElementById('agentFixed');
  const input = document.getElementById('agentId');
  const link = document.getElementById('editAgentLink');
  const editing = input.style.display !== 'none';

  if (!editing) {
    fixed.style.display = 'none';
    input.style.display = 'block';
    input.focus();
    link.textContent = 'Done';
  } else {
    fixed.textContent = input.value.trim() || fixed.textContent;
    fixed.style.display = 'block';
    input.style.display = 'none';
    link.textContent = 'Edit';
  }
}

const TOKEN_BROKER_URL = 'https://script.google.com/macros/s/AKfycbyf2qf5HvfOqwbZSVqjYgH0E7MDofqb3WtUql4yysdpmlb95VHignzfOHPnReYQwJaU/exec';

async function connect() {
  const inputVisible = document.getElementById('agentId').style.display !== 'none';
  const agentId = inputVisible
    ? document.getElementById('agentId').value.trim()
    : document.getElementById('agentFixed').textContent.trim();

  if (!agentId) {
    setStatus('Kripya Agent ID bharein', 'error');
    return;
  }

  document.getElementById('connectBtn').disabled = true;
  setStatus('Getting session token...', '');

  let ephemeralToken;
  try {
    const tokenRes = await fetch(TOKEN_BROKER_URL);
    if (!tokenRes.ok) throw new Error(`Token broker error (${tokenRes.status})`);
    const tokenData = await tokenRes.json();
    if (tokenData.error) throw new Error(tokenData.error);
    ephemeralToken = tokenData.token;
    if (!ephemeralToken) throw new Error('Token nahi mila: ' + JSON.stringify(tokenData));
  } catch (e) {
    setStatus('Token error: ' + e.message, 'error');
    document.getElementById('connectBtn').disabled = false;
    return;
  }

  setStatus('Connecting...', '');
  const wsUrl = `wss://api.x.ai/v1/realtime?agent_id=${encodeURIComponent(agentId)}`;
  ws = new WebSocket(wsUrl, [`xai-client-secret.${ephemeralToken}`]);

  ws.onopen = () => {
    setStatus('🟢 Connected — type ya mic dono se baat kar sakte hain', 'live');
    document.getElementById('inputRow').style.display = 'flex';
    document.getElementById('connectBtn').style.display = 'none';
    ws.send(JSON.stringify({
      type: 'session.update',
      session: {
        modalities: ['text', 'audio'],
        turn_detection: { type: 'server_vad', threshold: 0.5, silence_duration_ms: 700 },
        input_audio_format: 'pcm16',
        output_audio_format: 'pcm16'
      }
    }));
    audioContext = new AudioContext({ sampleRate: 24000 });
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'response.output_text.delta' || data.type === 'response.text.delta' || data.type === 'response.output_audio_transcript.delta') {
      if (!currentAgentDiv) {
        const chat = document.getElementById('chat');
        chat.style.display = 'block';
        currentAgentDiv = document.createElement('div');
        currentAgentDiv.className = 'msg-agent';
        currentAgentDiv.innerHTML = '<span class="msg-label">अग्रिमा</span>';
        chat.appendChild(currentAgentDiv);
      }
      currentAgentDiv.innerHTML += data.delta;
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    } else if (data.type === 'response.output_audio.delta') {
      playAudioChunk(data.delta);
    } else if (data.type === 'input_audio_buffer.speech_started') {
      nextPlayTime = audioContext ? audioContext.currentTime : 0;
    } else if (data.type === 'response.done') {
      currentAgentDiv = null;
    } else if (data.type === 'error') {
      setStatus('Error: ' + (data.error?.message || JSON.stringify(data)), 'error');
    }
  };

  ws.onerror = () => {
    setStatus('Connection error. API key ya Agent ID check karein.', 'error');
  };

  ws.onclose = (event) => {
    setStatus(`Disconnected. (code: ${event.code})`, event.code === 1000 ? '' : 'error');
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('connectBtn').style.display = 'block';
    document.getElementById('inputRow').style.display = 'none';
  };
}

async function toggleMic() {
  const micBtn = document.getElementById('micBtn');
  if (!micActive) {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 24000 } });
    } catch (e) {
      setStatus('Mic access nahi mila.', 'error');
      return;
    }
    const source = audioContext.createMediaStreamSource(mediaStream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);
    const silentGain = audioContext.createGain();
    silentGain.gain.value = 0;
    source.connect(processor);
    processor.connect(silentGain);
    silentGain.connect(audioContext.destination);
    processor.onaudioprocess = (e) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const input = e.inputBuffer.getChannelData(0);
        const pcm16 = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++) {
          const s = Math.max(-1, Math.min(1, input[i]));
          pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        let binary = '';
        const bytes = new Uint8Array(pcm16.buffer);
        for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: btoa(binary) }));
      }
    };
    micActive = true;
    micBtn.textContent = '🔴 Mic Off';
    micBtn.style.background = '#ef4444';
  } else {
    if (processor) { processor.disconnect(); processor = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    micActive = false;
    micBtn.textContent = '🎙️ Mic On';
    micBtn.style.background = '#16a34a';
  }
}

async function playAudioChunk(base64) {
  if (!audioContext) return;
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const pcm16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(pcm16.length);
  for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 0x8000;
  const buffer = audioContext.createBuffer(1, float32.length, 24000);
  buffer.copyToChannel(float32, 0);
  const src = audioContext.createBufferSource();
  src.buffer = buffer;
  src.connect(audioContext.destination);
  const now = audioContext.currentTime;
  if (nextPlayTime < now) nextPlayTime = now;
  src.start(nextPlayTime);
  nextPlayTime += buffer.duration;
}
</script>

</body>
</html>
